qwen:
  api_key: "${QWEN_API_KEY}"
  base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.7-max"
  extraction_model: "qwen3.7-plus"
  consolidation_model: "qwen3.7-max"
  embedding_model: "text-embedding-v3"
  timeout: 60
  max_retries: 3

memory:
  db_path: "data/agentos.db"
  chroma_path: "data/chroma_db"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  max_context_tokens: 8000
  consolidation_interval_hours: 24
  max_episodic_per_project: 10000

skills:
  enabled:
    - "git_ops"
    - "filesystem"
    - "web_search"
    - "n8n_trigger"
    - "scheduler"
    - "code_intel"
  git_ops:
    default_branch: "main"
    auto_commit: false
  filesystem:
    allowed_roots:
      - "~/proyects"
      - "~/Documents"
  web_search:
    default_limit: 5
    timeout: 15
  n8n_trigger:
    base_url: "${N8N_BASE_URL}"
    api_key: "${N8N_API_KEY}"
    timeout: 30
  scheduler:
    default_timezone: "America/Lima"
  code_intel:
    test_command: "pytest -v"
    lint_command: "ruff check ."

agent:
  max_iterations: 20
  temperature: 0.3
  system_prompt_template: |
    You are Aki, an AI agent with persistent project memory for coding workflows.
    Preserve durable project context, decisions, and procedures across sessions.
    Be concise, practical, and careful with context budgets.
  memory_injection_template: |
    Contexto relevante de memoria:
    {memory_context}
  skill_injection_template: |
    Herramientas disponibles:
    {skills_list}

agent_profiles:
  default: "builder"
  profiles:
    - id: "planner"
      name: "Planner"
      description: "Scopes and sequences work before any code changes; read-only."
      role: "planner"
      prompt_template: |
        You are Aki's planning agent. Read the codebase and propose a sequenced
        plan; do not write or execute anything.
      tools:
        allowed: ["filesystem.read", "filesystem.glob", "filesystem.search", "git_ops.status", "git_ops.log", "git_ops.diff"]
      memory:
        scope: "project"
    - id: "builder"
      name: "Builder"
      description: "Implements planned changes with full tool access."
      role: "builder"
      prompt_template: |
        You are Aki's implementation agent. Follow the agreed plan, write and
        verify code, and keep commits scoped to the task at hand.
      tools:
        allowed: ["filesystem.read", "filesystem.write", "filesystem.glob", "filesystem.search", "git_ops.status", "git_ops.diff", "git_ops.commit", "git_ops.init", "code_intel.test_command", "code_intel.lint_command"]
      memory:
        scope: "project"
