version: "3.8"

services:
  agentos:
    build:
      context: .
      target: production
    image: agentos-memory:latest
    container_name: agentos-memory
    environment:
      - QWEN_API_KEY=${QWEN_API_KEY}
      - N8N_BASE_URL=${N8N_BASE_URL:-http://host.docker.internal:5678}
      - N8N_API_KEY=${N8N_API_KEY}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ~/.ssh:/home/appuser/.ssh:ro
      - ~/proyects:/home/appuser/proyects:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Redis for caching (if needed later)
