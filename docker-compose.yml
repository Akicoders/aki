version: "3.8"

# Development helper only.
#
# Coding hosts such as OpenCode and Claude Code should launch the local stdio
# MCP server directly with `uv run agentos mcp`; compose is not the normal
# runtime path because MCP stdio is process-bound rather than HTTP-bound.

services:
  agentos:
    build:
      context: .
      target: production
    image: agentos-memory:latest
    container_name: agentos-memory
    environment:
      - QWEN_API_KEY=${QWEN_API_KEY}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ~/.ssh:/home/appuser/.ssh:ro
      - ~/proyects:/home/appuser/proyects:ro
    command: ["agentos", "mcp"]
    stdin_open: true
    tty: true
    restart: unless-stopped

  # Optional: Redis for caching (if needed later)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

