<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Aki Cockpit{% endblock %}</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; background: #10131a; color: #e6e6e6; }
    a { color: #6cb6ff; }
    .panel { border: 1px solid #333; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
    .panel h2 { margin-top: 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 0.25rem 0.5rem; border-bottom: 1px solid #222; }
  </style>
</head>
<body>
  <header>
    <h1>{% block header %}Aki Cockpit{% endblock %}</h1>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
