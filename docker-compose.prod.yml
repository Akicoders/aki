version: "3.8"

# Container deployment helper only.
#
# Aki's hackathon MVP is delivered to coding agents through local MCP stdio.
# There is intentionally no HTTP port or /health endpoint in this service.

services:
  aki:
    build:
      context: .
      target: production
    image: ${REGISTRY:-ghcr.io/Akicoders}/aki-memory:${VERSION:-latest}
    container_name: aki-memory-prod
    environment:
      - QWEN_API_KEY=${QWEN_API_KEY}
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    volumes:
      - /opt/agentos/data:/app/data
      - /opt/agentos/config.yaml:/app/config.yaml:ro
    command: ["agentos", "mcp"]
    stdin_open: true
    tty: true
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "0.5"
          memory: "512M"

  # Optional: Prometheus for metrics
  # prometheus:
  #   image: prom/prometheus:latest
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus_data:/prometheus
